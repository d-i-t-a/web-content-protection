<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@d-i-t-a/web-content-protection — Paginated Iframe Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
    }
    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 18px; font-weight: 600; color: #f0f6fc; }
    header h1 span { color: #58a6ff; }
    .toolbar { display: flex; gap: 8px; align-items: center; }
    .toolbar button {
      padding: 6px 16px; border: 1px solid #30363d; border-radius: 6px;
      font-size: 13px; cursor: pointer; background: #21262d; color: #c9d1d9;
    }
    .toolbar button:hover { background: #30363d; }
    .toolbar button.primary { background: #238636; border-color: #2ea043; color: #fff; }
    .toolbar button.danger { background: #da3633; border-color: #f85149; color: #fff; }
    .status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #8b949e; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #f85149; }
    .status-dot.active { background: #3fb950; }
    .layout { display: grid; grid-template-columns: 1fr 320px; height: calc(100vh - 57px); }
    #epub-reader-frame { position: relative; overflow: hidden; background: #faf9f6; }
    #epub-reader-frame iframe { width: 100%; height: 100%; border: none; }
    .nav-btn {
      position: absolute; top: 50%; transform: translateY(-50%); z-index: 10;
      width: 48px; height: 80px; background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.1);
      border-radius: 8px; color: #666; font-size: 24px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-btn:hover { background: rgba(0,0,0,0.1); }
    .nav-btn.prev { left: 4px; }
    .nav-btn.next { right: 4px; }
    .page-info {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      font-size: 12px; color: #8b949e; background: rgba(0,0,0,0.6);
      padding: 4px 12px; border-radius: 4px;
    }
    .sidebar { background: #161b22; border-left: 1px solid #30363d; display: flex; flex-direction: column; }
    .sidebar h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e; padding: 16px 16px 8px; }
    .event-log { flex: 1; overflow-y: auto; padding: 8px 16px; font-family: monospace; font-size: 12px; }
    .event-entry { padding: 4px 0; border-bottom: 1px solid #21262d; }
    .event-time { color: #8b949e; }
    .event-type { color: #58a6ff; font-weight: 600; }
    .event-detail { color: #f0883e; }
    .log-empty { color: #484f58; font-style: italic; padding: 8px 0; }
    .test-buttons { padding: 12px 16px; border-top: 1px solid #30363d; display: flex; flex-wrap: wrap; gap: 6px; }
    .test-buttons button {
      padding: 4px 10px; border: 1px solid #30363d; border-radius: 4px;
      font-size: 11px; cursor: pointer; background: #21262d; color: #c9d1d9;
    }
    .info-bar { padding: 12px 16px; border-bottom: 1px solid #30363d; font-size: 12px; color: #8b949e; line-height: 1.6; }
    .info-bar code { background: #21262d; padding: 2px 6px; border-radius: 3px; font-size: 11px; color: #f0883e; }
  </style>
</head>
<body>
  <header>
    <h1><span>@d-i-t-a/</span>web-content-protection <small style="color:#8b949e;font-weight:400;font-size:13px;">— Paginated Iframe Demo</small></h1>
    <div class="toolbar">
      <div class="status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Inactive</span>
      </div>
      <button class="primary" id="btnActivate">Activate</button>
      <button class="danger" id="btnDeactivate">Deactivate</button>
    </div>
  </header>
  <div class="layout">
    <div id="epub-reader-frame">
      <button class="nav-btn prev" id="btnPrev">&#8592;</button>
      <iframe id="epubContentIframe" src="iframe-paginated-content.html"></iframe>
      <button class="nav-btn next" id="btnNext">&#8594;</button>
      <div class="page-info" id="pageInfo">Page 1</div>
    </div>
    <div class="sidebar">
      <div class="info-bar">
        <strong>Paginated mode.</strong> CSS columns + <code>translateX</code> pagination inside an iframe.
        Text on non-visible pages is scrambled.
      </div>
      <h2>Event Log</h2>
      <div class="event-log" id="eventLog">
        <div class="log-empty">Protection events will appear here...</div>
      </div>
      <div class="test-buttons">
        <button id="btnTestCopy">Test Copy</button>
        <button id="btnTestPrint">Test Print</button>
        <button id="btnDumpText">Dump innerText</button>
        <button id="btnClearLog">Clear Log</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { ContentProtection } from "../dist/index.js";

    const readerFrame = document.getElementById("epub-reader-frame");
    const iframe = document.getElementById("epubContentIframe");
    const eventLog = document.getElementById("eventLog");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const pageInfo = document.getElementById("pageInfo");

    let protection = null;
    let currentPage = 0;
    let totalPages = 1;

    function logEvent(event) {
      const empty = eventLog.querySelector(".log-empty");
      if (empty) empty.remove();
      const time = new Date().toLocaleTimeString();
      const entry = document.createElement("div");
      entry.className = "event-entry";
      entry.innerHTML = `<span class="event-time">${time}</span> <span class="event-type">${event.type}</span>${event.detail ? ` <span class="event-detail">${event.detail}</span>` : ""}`;
      eventLog.appendChild(entry);
      eventLog.scrollTop = eventLog.scrollHeight;
    }

    function setupPagination() {
      const doc = iframe.contentDocument;
      if (!doc) return;
      const body = doc.body;
      const w = iframe.clientWidth;
      const h = iframe.clientHeight;
      const colW = w - 120;

      // Set CSS columns on the body
      body.style.height = (h - 80) + "px";
      body.style.maxHeight = (h - 80) + "px";
      body.style.overflow = "hidden";
      body.style.columnWidth = colW + "px";
      body.style.columnGap = "120px";
      body.style.columnFill = "auto";

      // Calculate total pages
      requestAnimationFrame(() => {
        totalPages = Math.max(1, Math.ceil(body.scrollWidth / w));
        currentPage = 0;
        goToPage(0);
        pageInfo.textContent = `Page 1 of ${totalPages}`;
      });
    }

    function goToPage(page) {
      const doc = iframe.contentDocument;
      if (!doc) return;
      currentPage = Math.max(0, Math.min(page, totalPages - 1));
      const w = iframe.clientWidth;
      doc.body.style.transform = `translateX(${-(currentPage * w)}px)`;
      pageInfo.textContent = `Page ${currentPage + 1} of ${totalPages}`;

      // Wait for transform to apply, then update obfuscation
      requestAnimationFrame(() => {
        protection?.textObfuscation?.recalculate();
      });
    }

    document.getElementById("btnPrev").addEventListener("click", () => goToPage(currentPage - 1));
    document.getElementById("btnNext").addEventListener("click", () => goToPage(currentPage + 1));
    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") goToPage(currentPage - 1);
      if (e.key === "ArrowRight") goToPage(currentPage + 1);
    });

    function buildConfig() {
      const iframes = [iframe];
      const targets = { contentElement: readerFrame, contentIframes: iframes };
      return {
        onEvent: logEvent,
        copyProtection: { ...targets, mode: "block", blockCut: true, blockedMessage: "[Copy protected]" },
        contextMenuProtection: targets,
        dragPrevention: targets,
        printProtection: targets,
        keyboardProtection: { ...targets, blockSave: true, blockViewSource: true, blockDevToolsShortcut: true, blockConsoleShortcut: true, blockF12: true },
        textObfuscation: { scrollContainer: readerFrame, contentRoot: readerFrame, contentIframes: iframes, viewportPadding: 30 },
        tamperDetection: { protectedElements: [readerFrame], contentRoot: readerFrame, sentinelCount: 3, action: "callback", autoRestore: true, restoreDelay: 2000 },
      };
    }

    async function activate() {
      if (!iframe.contentDocument?.body) {
        await new Promise((resolve) => iframe.addEventListener("load", resolve, { once: true }));
      }
      setupPagination();

      // Wait for pagination layout to settle
      await new Promise((r) => setTimeout(r, 50));

      if (protection) protection.deactivate();
      protection = new ContentProtection(buildConfig());
      await protection.activate();

      statusDot.classList.add("active");
      statusText.textContent = "Active";
      logEvent({ type: "system", timestamp: Date.now(), detail: `Paginated: ${totalPages} pages` });
    }

    function deactivate() {
      if (protection) { protection.deactivate(); protection = null; }
      statusDot.classList.remove("active");
      statusText.textContent = "Inactive";
      logEvent({ type: "system", timestamp: Date.now(), detail: "Protection deactivated" });
    }

    document.getElementById("btnActivate").addEventListener("click", activate);
    document.getElementById("btnDeactivate").addEventListener("click", deactivate);
    document.getElementById("btnClearLog").addEventListener("click", () => {
      eventLog.innerHTML = '<div class="log-empty">Protection events will appear here...</div>';
    });
    document.getElementById("btnTestCopy").addEventListener("click", () => document.execCommand("copy"));
    document.getElementById("btnTestPrint").addEventListener("click", () => window.print());
    document.getElementById("btnDumpText").addEventListener("click", () => {
      try {
        const text = iframe.contentDocument.body.innerText;
        logEvent({ type: "system", timestamp: Date.now(), detail: `iframe innerText: ${text.length} chars, ${text.split(/\s+/).length} words` });
        console.log("--- iframe innerText dump ---");
        console.log(text.substring(0, 500) + "...");
      } catch (e) {
        logEvent({ type: "system", timestamp: Date.now(), detail: "Dump failed: " + e.message });
      }
    });

    window.addEventListener("resize", () => {
      setupPagination();
    });

    iframe.addEventListener("load", () => activate());
  </script>
</body>
</html>
